name: Update Claude Code Version

on:
  schedule:
    - cron: '0 23 * * *'  # Run daily at midnight CET (23:00 UTC)
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Check for updates
        id: check
        run: |
          # Use the update script to check for updates
          if ./scripts/update-version.sh --check; then
            echo "update_needed=false" >> $GITHUB_OUTPUT
          else
            # Extract versions from script output
            CURRENT_VERSION=$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' package.nix | head -1)
            LATEST_VERSION=$(npm view @anthropic-ai/claude-code version 2>/dev/null || curl -s https://registry.npmjs.org/@anthropic-ai/claude-code/latest | sed -n 's/.*"version":"\([^"]*\)".*/\1/p')
            
            echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "latest=$LATEST_VERSION" >> $GITHUB_OUTPUT
            echo "update_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update version and hash
        if: steps.check.outputs.update_needed == 'true'
        run: |
          # Run the update script
          ./scripts/update-version.sh

      - name: Generate PR body
        if: steps.check.outputs.update_needed == 'true'
        env:
          CURRENT_VERSION: ${{ steps.check.outputs.current }}
          LATEST_VERSION: ${{ steps.check.outputs.latest }}
        run: |
          CHANGELOG_URL="https://raw.githubusercontent.com/anthropics/claude-code/main/CHANGELOG.md"
          curl -sf "$CHANGELOG_URL" -o /tmp/claude-changelog.md

          # Extract changelog sections from LATEST_VERSION down to (not including) CURRENT_VERSION.
          # The changelog lists versions in descending order with headers of the form "## X.Y.Z".
          awk -v old="$CURRENT_VERSION" -v new="$LATEST_VERSION" '
            /^## / {
              ver = substr($0, 4)
              gsub(/[[:space:]]+$/, "", ver)
              if (ver == new) { capturing = 1 }
              if (ver == old) { capturing = 0; exit }
            }
            capturing { print }
          ' /tmp/claude-changelog.md > /tmp/changelog-excerpt.md

          {
            echo "## Automated Claude Code Update"
            echo ""
            echo "This PR updates Claude Code from version \`${CURRENT_VERSION}\` to \`${LATEST_VERSION}\`."
            echo ""
            echo "### Changes"
            echo "- Updated \`version\` in \`package.nix\`"
            echo "- Updated \`sha256\` hash for the npm tarball"
            echo "- Updated \`flake.lock\`"
            echo ""
            echo "### Verification"
            echo "- ✅ Version number updated in \`package.nix\`"
            echo "- ✅ Tarball hash automatically calculated and updated"
            echo "- ✅ Build verified during CI"
            echo "- ✅ All changes automated via update script"
            echo ""
            echo "### Upstream Changelog"
            echo ""
            if [ -s /tmp/changelog-excerpt.md ]; then
              cat /tmp/changelog-excerpt.md
            else
              echo "_Could not fetch changelog for versions \`${CURRENT_VERSION}\` → \`${LATEST_VERSION}\`._"
            fi
            echo ""
            echo "---"
            echo ""
            echo "To test this update locally:"
            echo '```bash'
            echo "nix build"
            echo "./result/bin/claude --version"
            echo '```'
            echo ""
            echo "This PR was automatically generated by the update workflow."
          } > /tmp/pr-body.md

      - name: Create Pull Request
        if: steps.check.outputs.update_needed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update claude-code to version ${{ steps.check.outputs.latest }}"
          title: "chore: update claude-code to version ${{ steps.check.outputs.latest }}"
          body-path: /tmp/pr-body.md
          branch: update-claude-code-${{ steps.check.outputs.latest }}
          delete-branch: true
          labels: |
            dependencies
            automated
      
      - name: Enable Auto-Merge
        if: steps.check.outputs.update_needed == 'true' && steps.create-pr.outputs.pull-request-created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash --delete-branch

      - name: Summary
        if: always()
        run: |
          echo "## Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check.outputs.update_needed }}" == "true" ]; then
            echo "- **Current Version:** ${{ steps.check.outputs.current }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Latest Version:** ${{ steps.check.outputs.latest }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Pull request created for version update!" >> $GITHUB_STEP_SUMMARY
          else
            CURRENT_VERSION=$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' package.nix | head -1)
            echo "- **Current Version:** $CURRENT_VERSION" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Already up to date!" >> $GITHUB_STEP_SUMMARY
          fi
